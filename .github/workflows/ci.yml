name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  # Valores fictícios só para permitir o build — nenhuma chamada real ao
  # Supabase acontece durante o typecheck/build/testes de fumaça.
  NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
  NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
  SUPABASE_SERVICE_ROLE_KEY: placeholder-service-role-key
  NEXT_PUBLIC_APP_URL: http://localhost:3000

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Checar tipos
        run: npx tsc --noEmit

      - name: Testes unitários (Vitest)
        run: npm run test

      - name: Build de produção
        run: npm run build

      - name: Instalar navegador do Playwright
        run: npx playwright install --with-deps chromium

      - name: Testes de fumaça (Playwright)
        run: npm run test:e2e
        env:
          CI: true

      - name: Upload do relatório do Playwright
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
